<!--
  ╔════════════════════════════════════════════════════════════════════════╗
  ║  WRITING ENTRY TEMPLATE                                                ║
  ║                                                                        ║
  ║  To create a new writing entry:                                        ║
  ║    1. Copy this file to writing/<your-slug>.html                       ║
  ║    2. Replace all [REPLACE: ...] markers with real content             ║
  ║    3. Add a matching row to ARTICLES in data.js                        ║
  ║                                                                        ║
  ║  Chrome (TopNav + Footer) is handled by React — don't touch the        ║
  ║  script block at the bottom. Just edit the article content.            ║
  ╚════════════════════════════════════════════════════════════════════════╝
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>[REPLACE: Article Title] · Claudemonzter</title>
<meta name="description" content="[REPLACE: One-sentence description for social previews and search.]" />

<link rel="stylesheet" href="../design-system/colors_and_type.css" />

<style>
  html, body { background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh; }
  body { font-family: var(--font-sans); }
  a { color: inherit; text-decoration: none; }

  .page { width: 100%; max-width: 1280px; margin: 0 auto; }

  /* Article typography — pre-wired for standard elements. */
  .article-body { max-width: 680px; margin: 0 auto; }
  .article-body p { font-size: 18px; line-height: 1.65; margin: 0 0 22px; color: var(--fg); }
  .article-body p.lede {
    font-family: var(--font-display); font-weight: 400; font-style: italic;
    font-size: 24px; line-height: 1.45; color: var(--fg);
    font-variation-settings: "opsz" 72, "SOFT" 100;
    margin-bottom: 36px;
  }
  .article-body h2 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 32px; line-height: 1.15; letter-spacing: -0.015em;
    margin: 48px 0 16px;
    font-variation-settings: "opsz" 72;
  }
  .article-body h3 {
    font-family: var(--font-sans); font-weight: 600;
    font-size: 18px; line-height: 1.3;
    margin: 36px 0 12px;
  }
  .article-body blockquote {
    margin: 28px 0; padding: 4px 0 4px 20px;
    border-left: 2px solid var(--candle);
    font-family: var(--font-display); font-style: italic;
    font-size: 19px; line-height: 1.55; color: var(--fg-muted);
    font-variation-settings: "opsz" 48, "SOFT" 100;
  }
  .article-body ul, .article-body ol {
    font-size: 17px; line-height: 1.65; padding-left: 22px; margin: 0 0 22px;
  }
  .article-body li { margin-bottom: 8px; color: var(--fg-muted); }
  .article-body code {
    background: var(--bg-elev-2); padding: 2px 6px;
    border: 1px solid var(--line); border-radius: 2px;
    font-size: 14px; color: var(--accent);
  }
  .article-body hr {
    border: none; border-top: 1px dashed var(--line-loud);
    margin: 48px auto; width: 80px;
  }
  .article-body a {
    color: var(--accent); border-bottom: 1px solid color-mix(in oklch, var(--accent) 40%, transparent);
  }

  .meta-row {
    display: flex; gap: 16px; align-items: center;
    font-family: var(--font-mono); font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--fg-subtle);
  }
  .meta-row .sep { color: var(--line-loud); }
  .meta-row .accent { color: var(--candle); }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="page">

  <!-- ─── SITE CHROME ─────────────────────────────────────────── -->
  <div id="topnav-mount"></div>

  <!-- ─── ARTICLE HEADER ──────────────────────────────────────── -->
  <section style="padding: 64px 40px 32px;">
    <div style="max-width: 680px; margin: 0 auto;">

      <!-- [REPLACE: date · tag · read time] -->
      <div class="meta-row">
        <span class="accent">MM·DD·YYYY</span>
        <span class="sep">·</span>
        <span>ESSAY</span>
        <span class="sep">·</span>
        <span>X min read</span>
      </div>

      <!-- [REPLACE: title — use <span style="color: var(--accent); font-style: italic;"> for emphasis word] -->
      <h1 style='font-family: var(--font-display); font-weight: 700; font-size: 60px; line-height: 1.02; letter-spacing: -0.025em; margin: 22px 0 0; font-variation-settings: "opsz" 144;'>
        Article <span style="color: var(--accent); font-style: italic;">title</span>.
      </h1>

      <!-- [REPLACE: subtitle / kicker] -->
      <p style='font-family: var(--font-display); font-style: italic; font-size: 22px; line-height: 1.4; margin-top: 18px; color: var(--fg-muted); font-variation-settings: "opsz" 72, "SOFT" 100;'>
        A one-line subtitle that frames the piece.
      </p>
    </div>
  </section>

  <!-- ─── ARTICLE BODY ────────────────────────────────────────── -->
  <!--
    Available elements (all pre-styled):
      <p>              — body text (18px)
      <p class="lede"> — opening paragraph (24px italic display font)
      <h2>             — section heading (32px display)
      <h3>             — sub-heading (18px sans bold)
      <blockquote>     — pull quote (candlelight border)
      <ul> / <ol>      — lists
      <code>           — inline code
      <hr>             — section divider (dashed line)
      <a href="...">   — link (accent color, underlined)
  -->
  <article class="article-body" style="padding: 0 40px 48px;">

    <p class="lede">
      [REPLACE: Opening paragraph — sets the tone. Use <em> for emphasis.]
    </p>

    <p>
      [REPLACE: Body content here.]
    </p>

    <hr/>

    <p style="color: var(--fg-subtle); font-size: 15px;">
      Filed under <a href="../writing.html">field notes</a>.
    </p>
  </article>

  <!-- ─── FOOTER ──────────────────────────────────────────────── -->
  <div id="footer-mount" style="margin-top: 80px;"></div>

</div>

<!-- Site chrome scripts — don't modify -->
<script src="../data.js"></script>
<script type="text/babel" src="../components/Wordmark.jsx"></script>
<script type="text/babel" src="../components/Primitives.jsx"></script>
<script type="text/babel" src="../components/HomeShell.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('topnav-mount')).render(<TopNav active="WRITING" />);
  ReactDOM.createRoot(document.getElementById('footer-mount')).render(<Footer />);
</script>

</body>
</html>
