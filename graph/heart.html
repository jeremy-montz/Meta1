<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Heart · Persona Matrix · Claudemonzter</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../design-system/colors_and_type.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  html, body { background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh; }
  body { padding: 0; margin: 0; overflow-x: hidden; font-family: var(--font-sans); }
  a { color: inherit; text-decoration: none; }

  /* Graph sub-nav — matches dashboard.html */
  .graph-subnav {
    display: flex; align-items: center; gap: 24px;
    padding: 12px 40px;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    position: relative; z-index: 1;
  }
  .graph-subnav-label { color: var(--fg-faint); }
  .graph-subnav a { color: var(--fg-muted); text-decoration: none; padding-bottom: 2px; border-bottom: 1px solid transparent; }
  .graph-subnav a:hover { color: var(--accent); }
  .graph-subnav a.active { color: var(--accent); border-bottom-color: var(--accent); }

  :root {
    --cm-grid-opacity: 0.6;
    --cm-scan-opacity: 0.4;
    --cm-noise-opacity: 0.3;
    --cm-vignette-opacity: 0.3;
    --cm-mascot-opacity: 0.35;
    --cm-glitch-duration: 6s;
    --cm-flicker-duration: 9s;
    --cm-title-rotate: 0deg;
  }

  /* ─── Background layers — controlled by --cm-* vars driven by crazy ── */
  .bg-grid-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    opacity: var(--cm-grid-opacity);
  }
  .bg-scan-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image: repeating-linear-gradient(0deg, transparent 0 2px, var(--scan-color) 2px 3px);
    mix-blend-mode: screen;
    opacity: var(--cm-scan-opacity);
  }
  .bg-vignette-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background:
      radial-gradient(ellipse 80% 70% at 50% 40%, transparent 50%, rgba(0,0,0,0.6) 100%),
      radial-gradient(ellipse 40% 30% at 50% 100%, color-mix(in oklch, var(--party) 18%, transparent), transparent 70%);
    opacity: var(--cm-vignette-opacity);
  }
  /* ─── Crazy gates — disable effects entirely below thresholds ───────── */
  .crazy-0 .bg-grid-layer, .crazy-1 .bg-grid-layer { display: none; }
  .crazy-0 .bg-scan-layer, .crazy-1 .bg-scan-layer, .crazy-2 .bg-scan-layer { display: none; }
  .crazy-0 .bg-vignette-layer, .crazy-1 .bg-vignette-layer, .crazy-2 .bg-vignette-layer { display: none; }
  .crazy-0 .hyde-stamp, .crazy-1 .hyde-stamp, .crazy-2 .hyde-stamp,
  .crazy-3 .hyde-stamp, .crazy-4 .hyde-stamp, .crazy-5 .hyde-stamp { display: none; }

  /* Hyde gate */
  html:not(.hyde) .hyde-stamp,
  html:not(.hyde) .bg-vignette-layer { display: none; }

  /* Glitch on title — only at high crazy */
  @keyframes cm-title-glitch {
    0%, 96%, 100%   { transform: translate(0, 0) rotate(var(--cm-title-rotate)); filter: none; }
    97%             { transform: translate(-1px, 0) rotate(var(--cm-title-rotate)); filter: hue-rotate(20deg); }
    98%             { transform: translate(1px, 0) rotate(var(--cm-title-rotate)); }
  }
  .crazy-8 h1, .crazy-9 h1, .crazy-10 h1 {
    animation: cm-title-glitch var(--cm-glitch-duration) infinite steps(1, end);
  }

  /* Heart-monitor scroll */
  @keyframes monitor-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .monitor-trace { animation: monitor-scroll 6s linear infinite; }

  /* Cells: hover */
  .dial-cell:hover:not([disabled]) {
    background: color-mix(in oklch, var(--accent) 10%, transparent) !important;
  }
  .dial-cell:focus-visible { outline: 1px solid var(--accent); outline-offset: -1px; }

  /* Subdued non-focused state */
  .dial-cell.is-dimmed { opacity: 0.28 !important; }
  .dial-details.is-dimmed-details { opacity: 0.5 !important; }

  /* Agent column header — clickable */
  .agent-col-header:hover {
    background: color-mix(in oklch, var(--accent) 10%, var(--bg-elev-1)) !important;
  }
  .agent-col-header:focus-visible { outline: 1px solid var(--accent); outline-offset: -1px; }

  /* Modal fade-in */
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* commit spinner */
  .cm-spinner {
    display: inline-block;
    animation: cm-spin 1s linear infinite;
  }
  @keyframes cm-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Loading pulse */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* Selection */
  ::selection { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>

<!-- ─── SITE CHROME (React) ─────────────────────────────────── -->
<div id="topnav-mount"></div>
<div class="graph-subnav">
  <span class="graph-subnav-label">GRAPH ›</span>
  <a href="../dashboard.html">Dashboard</a>
  <a href="heart.html" class="active">Heart</a>
  <a href="memory.html">Memory</a>
</div>

<!-- ─── PAGE CONTENT (React app) ──────────────────────────────── -->
<div id="root"></div>

<!-- ─── SITE FOOTER (React) ───────────────────────────────────── -->
<div id="footer-mount"></div>

<!-- Shared site chrome -->
<script src="../data.js"></script>
<script type="text/babel" src="../components/Wordmark.jsx"></script>
<script type="text/babel" src="../components/Primitives.jsx"></script>
<script type="text/babel" src="../components/HomeShell.jsx"></script>

<!-- Page-specific app -->
<script src="heart-data.js"></script>
<script type="text/babel" src="heart-dials.jsx"></script>
<script type="text/babel" src="heart-monitor.jsx"></script>
<script type="text/babel" src="heart-app.jsx"></script>

<!-- Mount site chrome -->
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('topnav-mount')).render(<TopNav base="../" active="GRAPH" />);
  ReactDOM.createRoot(document.getElementById('footer-mount')).render(<Footer base="../" />);
</script>
</body>
</html>
