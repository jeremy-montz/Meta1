<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Memory · Layer Map · Claudemonzter</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../design-system/colors_and_type.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  html, body { background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh; }
  body { padding: 0; margin: 0; overflow-x: hidden; font-family: var(--font-sans); }
  a { color: inherit; text-decoration: none; }

  /* Graph sub-nav — matches dashboard.html */
  .graph-subnav {
    display: flex; align-items: center; gap: 24px;
    padding: 12px 40px;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    position: relative; z-index: 1;
  }
  .graph-subnav-label { color: var(--fg-faint); }
  .graph-subnav a { color: var(--fg-muted); text-decoration: none; padding-bottom: 2px; border-bottom: 1px solid transparent; }
  .graph-subnav a:hover { color: var(--accent); }
  .graph-subnav a.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* fixed background layers — subtle grid + optional scanlines */
  .bg-grid-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    opacity: 0.55;
  }
  .bg-scan-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image: repeating-linear-gradient(0deg, transparent 0 2px, var(--scan-color) 2px 3px);
    mix-blend-mode: screen; opacity: 0.35;
  }

  /* matrix interactions */
  .memory-row { transition: filter 200ms var(--ease-out); }
  .memory-row:hover { filter: brightness(1.08); }
  .memory-row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* detail fade */
  @keyframes memory-fade-in {
    from { opacity: 0; transform: translateY(-2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* selection */
  ::selection { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>

<!-- ─── SITE CHROME (React) ─────────────────────────────────── -->
<div id="topnav-mount"></div>
<div class="graph-subnav">
  <span class="graph-subnav-label">GRAPH ›</span>
  <a href="../dashboard.html">Dashboard</a>
  <a href="heart.html">Heart</a>
  <a href="memory.html" class="active">Memory</a>
</div>

<!-- ─── PAGE CONTENT (React app) ──────────────────────────────── -->
<div id="root"></div>

<!-- ─── SITE FOOTER (React) ───────────────────────────────────── -->
<div id="footer-mount"></div>

<!-- Shared site chrome -->
<script src="../data.js"></script>
<script type="text/babel" src="../components/Wordmark.jsx"></script>
<script type="text/babel" src="../components/Primitives.jsx"></script>
<script type="text/babel" src="../components/HomeShell.jsx"></script>

<!-- Page-specific app -->
<script src="memory-data.js"></script>
<script type="text/babel" src="memory-matrix.jsx"></script>
<script type="text/babel" src="memory-app.jsx"></script>

<!-- Mount site chrome -->
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('topnav-mount')).render(<TopNav base="../" active="GRAPH" />);
  ReactDOM.createRoot(document.getElementById('footer-mount')).render(<Footer base="../" />);
</script>
</body>
</html>
