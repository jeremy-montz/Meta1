<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Writing · Claudemonzter Lab</title>
<meta name="description" content="Field notes, essays, and lab logs from the operator." />

<link rel="stylesheet" href="design-system/colors_and_type.css" />

<style>
  html, body { background: var(--bg); color: var(--fg); margin: 0; min-height: 100vh; }
  body { font-family: var(--font-sans); }
  a { color: inherit; text-decoration: none; }

  .home-page { width: 100%; max-width: 1280px; margin: 0 auto; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
    50%      { opacity: 0.45; box-shadow: 0 0 0 6px transparent; }
  }
  .pulse-dot { animation: pulse-dot 1.8s var(--ease-out) infinite; }

  .scribble {
    font-family: var(--font-hand);
    color: var(--fg-muted);
    font-size: 22px;
    line-height: 1.1;
    transform: rotate(-3deg);
    display: inline-block;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script src="data.js?v=3.3"></script>

<script type="text/babel" src="components/Wordmark.jsx"></script>
<script type="text/babel" src="components/Primitives.jsx"></script>
<script type="text/babel" src="components/HomeShell.jsx"></script>

<script type="text/babel">
const WritingIndex = () => (
  <div className="home-page">
    <TopNav active="WRITING" />

    {/* Hero */}
    <div style={{ padding: '64px 40px 32px' }}>
      <Eyebrow color="var(--candle)">// FIELD NOTES & ESSAYS</Eyebrow>
      <h1 style={{
        marginTop: 14,
        fontFamily: 'var(--font-display)', fontWeight: 700,
        fontSize: 76, lineHeight: 0.98, letterSpacing: '-0.025em',
        fontVariationSettings: '"opsz" 144',
        maxWidth: 880,
      }}>
        Writing <span style={{ fontStyle: 'italic', color: 'var(--accent)' }}>from the lab</span>.
      </h1>
      <p style={{ marginTop: 18, maxWidth: 640, fontSize: 17, lineHeight: 1.5 }}>
        Long-form essays, short lab logs, and the occasional rant about agentic memory.
        Newest entries first.
      </p>
      <p style={{ marginTop: 8, maxWidth: 640, fontSize: 14, color: 'var(--fg-subtle)' }}>
        {ARTICLES.length} {ARTICLES.length === 1 ? 'entry' : 'entries'} · most are still placeholders ·
        the first real entry is the top one.
      </p>
    </div>

    {/* List */}
    <div style={{ padding: '24px 40px 64px' }}>
      <div style={{ borderTop: '1px solid var(--line)' }}>
        {ARTICLES.map((a, i) => {
          const isReal = a.href && a.href !== '#';
          return (
            <a key={a.id} href={a.href || '#'} style={{
              display: 'grid', gridTemplateColumns: '90px 1fr 140px 80px 24px',
              gap: 24, padding: '28px 0',
              alignItems: 'baseline',
              borderBottom: '1px solid var(--line)',
              opacity: isReal ? 1 : 0.6,
              transition: 'background 200ms var(--ease-out)',
            }}
            onMouseEnter={e => { if (isReal) e.currentTarget.style.background = 'color-mix(in oklch, var(--accent) 4%, transparent)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--candle)', letterSpacing: '0.16em' }}>{a.date}</span>
              <div>
                <div style={{
                  fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 500,
                  letterSpacing: '-0.015em', lineHeight: 1.15,
                  fontVariationSettings: '"opsz" 48',
                }}>{a.title}</div>
                {!isReal && (
                  <div style={{
                    marginTop: 6,
                    fontFamily: 'var(--font-mono)', fontSize: 10,
                    letterSpacing: '0.18em', textTransform: 'uppercase',
                    color: 'var(--fg-faint)',
                  }}>PLACEHOLDER — DRAFT NOT YET WRITTEN</div>
                )}
              </div>
              <Badge tone={isReal ? 'accent' : 'neutral'}>{a.tag}</Badge>
              <span style={{
                fontFamily: 'var(--font-mono)', fontSize: 11,
                color: 'var(--fg-subtle)', textAlign: 'right',
              }}>{a.read}</span>
              <span style={{ color: isReal ? 'var(--accent)' : 'var(--fg-faint)' }}>↗</span>
            </a>
          );
        })}
      </div>

      <span className="scribble" style={{ marginTop: 28, display: 'inline-block', color: 'var(--candle)', fontSize: 22 }}>
        (co-written with AI · authorship remains in dispute)
      </span>
    </div>

    <Footer />
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<WritingIndex />);
</script>

</body>
</html>
