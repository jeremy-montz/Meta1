<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canon — Claudemonzter</title>
  <link rel="stylesheet" href="design-system/fonts.css">
  <link rel="stylesheet" href="design-system/colors_and_type.css">
  <style>
    :root {
      --bg:         var(--ink-900);
      --surface:    var(--ink-700);
      --surface2:   var(--ink-600);
      --border:     var(--ink-500);
      --accent:     var(--violet-300);
      --accent2:    var(--violet-500);
      --warn:       var(--candle);
      --error:      var(--blood);
      --info:       var(--ether);
      --text:       var(--ink-50);
      --muted:      var(--ink-300);
      --mono:       'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
      --sans:       'Inter Tight', 'Inter', system-ui, sans-serif;
      --display:    'Fraunces', 'Iowan Old Style', Georgia, serif;

      /* Canon integrity colors — three values only: Clean / Alert / Error / N/A */
      --ci-clean:   #a7ff7d;
      --ci-alert:   #f5c56a;
      --ci-error:   #ff4757;
      --ci-na:      var(--ink-300);

      /* File flag colors */
      --flag-req-declared: #a7ff7d;
      --flag-req-mia:      #ff4757;
      --flag-clean:        #a7ff7d;
      --flag-onloan:       #b57bff;
      --flag-orphaned:     #f5c56a;
      --flag-phantom:      #ff4757;
      --flag-stale:        #f5c56a;
      --flag-alert:        #f5c56a;
      --flag-error:        #ff4757;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 700px at 20% 10%, color-mix(in oklch, #7b61ff 14%, transparent), transparent 60%),
        radial-gradient(ellipse 700px 600px at 80% 80%, color-mix(in oklch, #b57bff 10%, transparent), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(color-mix(in oklch, #b57bff 6%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in oklch, #b57bff 6%, transparent) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    h1 {
      font-family: var(--display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variation-settings: "opsz" 96;
    }

    h1 span {
      color: var(--accent);
      font-style: italic;
      font-variation-settings: "opsz" 96, "SOFT" 100;
    }

    .header-meta { text-align: right; }

    .last-refresh {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .refresh-btn {
      margin-top: 0.4rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: border-color 0.2s, color 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Integrity bar ── */
    .integrity-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
    }

    .integrity-bar-label {
      color: var(--muted);
      text-transform: uppercase;
      margin-right: 0.25rem;
    }

    .agent-chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.55rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .ci-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Section header ── */
    .section-header {
      font-family: var(--display);
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: none;
      margin-top: 1.5rem;
      font-variation-settings: "opsz" 48;
    }

    /* ── Table ── */
    .canon-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-top: none;
      table-layout: fixed;
    }

    .canon-table thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    .canon-table th {
      padding: 0.5rem 0.75rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      border-right: 1px solid var(--border);
      overflow: hidden;
      vertical-align: top;
    }

    .canon-table th.col-file { text-align: left; }
    .canon-table th.col-unknown { color: var(--warn); }

    /* Jeremy column header — distinct */
    .canon-table th.col-jeremy {
      color: var(--info);
      border-left: 2px solid var(--info);
    }

    .th-status {
      font-size: 0.52rem;
      font-weight: 400;
      margin-top: 0.25rem;
      letter-spacing: 0.04em;
      text-transform: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canon-table td {
      padding: 0.4rem 0.75rem;
      font-size: 0.68rem;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canon-table tr:hover td { background: rgba(255,255,255,0.02); }

    .canon-table td.col-file { color: var(--text); }

    .canon-table td.col-file .location-tag {
      font-size: 0.55rem;
      color: var(--muted);
      margin-left: 0.4rem;
      letter-spacing: 0.08em;
    }

    .canon-table td.col-agent { text-align: center; }

    /* Jeremy column cells */
    .canon-table td.col-jeremy {
      text-align: center;
      border-left: 2px solid rgba(141,217,255,0.2);
    }

    /* Folder separator row */
    .canon-table tr.folder-row td {
      background: var(--surface);
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 0.75rem;
      border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    /* ── Flag cells ── */
    .flag-cell {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* Required-Declared: bold border to distinguish from plain Clean */
    .flag-req-declared {
      color: var(--flag-req-declared);
      background: rgba(167,255,125,0.08);
      border: 1px solid rgba(167,255,125,0.4);
      font-weight: 700;
    }

    /* Required-MIA: bold border to distinguish from plain Error */
    .flag-req-mia {
      color: var(--flag-req-mia);
      background: rgba(255,71,87,0.12);
      border: 1px solid rgba(255,71,87,0.5);
      font-weight: 700;
    }

    .flag-clean    { color: var(--flag-clean);    background: rgba(167,255,125,0.08); }
    .flag-onloan   { color: var(--flag-onloan);   background: rgba(181,123,255,0.1); }
    .flag-orphaned { color: var(--flag-orphaned); background: rgba(245,197,106,0.1); }
    .flag-phantom  { color: var(--flag-phantom);  background: rgba(255,71,87,0.1); }
    .flag-stale    { color: var(--flag-stale);    background: rgba(245,197,106,0.1); }
    .flag-alert    { color: var(--flag-alert);    background: rgba(245,197,106,0.1); }
    .flag-error    { color: var(--flag-error);    background: rgba(255,71,87,0.1); }
    .flag-unknown  { color: var(--warn);          background: rgba(245,197,106,0.1); }
    .flag-empty    { color: var(--border);        font-size: 0.5rem; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-flag { font-size: 0.7rem; }

    /* ── State messages ── */
    .state-msg {
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .state-msg .big {
      font-family: var(--display);
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="header-left">
        <div class="header-tag">// canon integrity</div>
        <h1>Canon <span>Matrix</span></h1>
      </div>
      <div class="header-meta">
        <div class="last-refresh" id="lastRefresh">—</div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>

    <div class="integrity-bar" id="integrityBar">
      <span class="integrity-bar-label">Agent Canon Status —</span>
    </div>

    <div id="canonOutput">
      <div class="state-msg">
        <div class="big">Loading...</div>
        <div>Fetching canon data</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <span class="flag-cell flag-req-declared" style="font-size:0.6rem;padding:0.1rem 0.3rem">R</span>
        Required-Declared
      </div>
      <div class="legend-item">
        <span class="flag-cell flag-req-mia" style="font-size:0.6rem;padding:0.1rem 0.3rem">R!</span>
        Required-MIA
      </div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-clean)">●</span> Clean</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-onloan)">⟳</span> On loan</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-orphaned)">!</span> Orphaned</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-phantom)">✕</span> Phantom</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-stale)">⚠</span> Stale</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-alert)">▲</span> Alert</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-error)">✖</span> Error</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--border)">·</span> Not loaded</div>
    </div>

    <div class="footer">
      <span>canon v0.7</span>
      <span id="fileCount">—</span>
    </div>

  </div>

  <!-- Embedded JSON block for Claude/QA readability -->
  <script type="application/json" id="canon-data">
  {
    "generated": null,
    "agents": [],
    "files": []
  }
  </script>

  <script>
    var SHEET_ID    = "12JrRfdHx2u2wsU_KQPHkYDRNk3_jUIEV9zSq4lFe8KE";
    var TAB_STATUS  = "AgentStatus";
    var TAB_FILES   = "FilesReported";
    var TAB_CHECKIN = "HumanCheckin";

    // ── Jeremy is hardcoded — never appears in AgentStatus.
    // All other agents are derived entirely from the AgentStatus sheet.
    // Column order is driven by Agent Order field from the sheet.
    // The HTML carries no hardcoded roster beyond Jeremy.
    var JEREMY = { nickname: "Jeremy", id: "AGT-000", order: 1 };

    function sheetUrl(tab) {
      return "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
             "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(tab);
    }

    // ── CSV parser — handles quoted fields with commas
    function parseCSV(text) {
      var lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      var headers = lines[0].split(",").map(function(h) {
        return h.replace(/^"|"$/g, "").trim();
      });
      return lines.slice(1).map(function(line) {
        var cols = [], inQuote = false, current = "";
        for (var i = 0; i < line.length; i++) {
          var ch = line[i];
          if (ch === '"') { inQuote = !inQuote; }
          else if (ch === ',' && !inQuote) { cols.push(current); current = ""; }
          else { current += ch; }
        }
        cols.push(current);
        var obj = {};
        headers.forEach(function(h, i) {
          obj[h] = (cols[i] || "").replace(/^"|"$/g, "").trim();
        });
        return obj;
      });
    }

    // ── Latest row per agent nickname from AgentStatus
    function latestAgentStatus(rows) {
      var map = {};
      rows.forEach(function(r) {
        var k = (r["Agent Nickname"] || "").toLowerCase();
        if (k) map[k] = r;
      });
      return map;
    }

    // ── Latest single row from HumanCheckin (append-only; last row wins)
    function latestHumanCheckin(rows) {
      if (!rows.length) return null;
      return rows[rows.length - 1];
    }

    // ── Build ordered agent list from AgentStatus rows.
    // Sort: Jeremy hardcoded first (order 1), then agents with Agent Order ascending,
    // then agents missing Agent Order sorted by Agent ID as tiebreaker.
    function buildAgentList(statusRows) {
      var seen = {};
      var withOrder = [];
      var withoutOrder = [];

      statusRows.forEach(function(r) {
        var name = (r["Agent Nickname"] || "").trim();
        var id   = (r["Agent ID"] || "").trim();
        var ord  = parseInt(r["Agent Order"], 10);
        if (!name || seen[name.toLowerCase()]) return;
        seen[name.toLowerCase()] = true;
        if (!isNaN(ord)) {
          withOrder.push({ nickname: name, id: id, order: ord });
        } else {
          withoutOrder.push({ nickname: name, id: id, order: null });
        }
      });

      withOrder.sort(function(a, b) { return a.order - b.order; });
      withoutOrder.sort(function(a, b) { return a.id.localeCompare(b.id, undefined, { numeric: true }); });

      // Jeremy is always first; never in AgentStatus
      return [JEREMY].concat(withOrder).concat(withoutOrder);
    }

    // ── CI color — Clean / Alert / Error / N/A
    function ciColor(ci) {
      var m = {
        "clean": "var(--ci-clean)",
        "alert": "var(--ci-alert)",
        "error": "var(--ci-error)"
      };
      return m[(ci || "").toLowerCase()] || "var(--ci-na)";
    }

    // ── Flag info — symbol + CSS class
    // The HTML renders what Meta1 wrote. No flag computation here.
    function flagInfo(flag) {
      if (!flag) return { sym: "·", cls: "flag-empty" };
      var map = {
        "required-declared": { sym: "R ✓",  cls: "flag-req-declared" },
        "required-mia":      { sym: "R !",  cls: "flag-req-mia" },
        "clean":             { sym: "●",    cls: "flag-clean" },
        "on loan":           { sym: "⟳",    cls: "flag-onloan" },
        "onloan":            { sym: "⟳",    cls: "flag-onloan" },
        "orphaned":          { sym: "!",    cls: "flag-orphaned" },
        "phantom":           { sym: "✕",    cls: "flag-phantom" },
        "stale":             { sym: "⚠",    cls: "flag-stale" },
        "alert":             { sym: "▲",    cls: "flag-alert" },
        "error":             { sym: "✖",    cls: "flag-error" }
      };
      var key = flag.toLowerCase().trim();
      return map[key] || { sym: flag.charAt(0).toUpperCase(), cls: "flag-unknown" };
    }

    // ── inferFolder — flag logic ONLY.
    // Never used for placement. Never called as a fallback when Drive Folder is blank.
    // Input: filename + agent nickname list. Output: owning agent name or null.
    // v2.6: parses agent name segment after tier prefix (e.g. "1-00 Meta1 Profile" → "Meta1")
    function inferFolder(fileName, agentNicknames) {
      var lower = fileName.toLowerCase().trim();
      // Strip tier prefix if present (e.g. "1-", "2-", "3-", "4-")
      var stripped = lower.replace(/^\d+-\s*/, "");
      for (var i = 0; i < agentNicknames.length; i++) {
        if (stripped.startsWith(agentNicknames[i].toLowerCase())) {
          return agentNicknames[i];
        }
      }
      return null;
    }

    // ── Build matrix from FilesReported rows.
    //
    // PLACEMENT RULE (authoritative — see Meta1 04 Canon Integrity Rules):
    //   Drive Folder column from FilesReported is the sole placement authority.
    //   Location column determines section (Drive / Claude.ai / GitHub).
    //   inferFolder() is NEVER called for placement. It is available for flag logic only.
    //   A blank Drive Folder + Location=Drive → Unknown section.
    //   A blank Drive Folder + Location=Claude.ai → Claude.ai section by declaring agent.
    //
    // The HTML derives no structure from filenames. Meta1 did that work at reconciliation.
    function buildMatrix(fileRows, agentNicknames) {
      var driveFiles   = {};  // { folderName: { fileName: { agentFlags, location } } }
      var claudeFiles  = {};  // { "Agent Project": { fileName: { agentFlags, location } } }
      var unknownFiles = {};  // { fileName: { agentFlags, location } } — Drive files with no folder

      fileRows.forEach(function(row) {
        var agent      = (row["Agent Nickname"] || "Unknown").trim();
        var fileName   = (row["File Name"] || "").trim();
        var driveFolder = (row["Drive Folder"] || "").trim();
        var location   = (row["Location"] || "Drive").trim().toLowerCase();
        var flag       = (row["Flag"] || "").trim();

        if (!fileName) return;

        if (location === "claude.ai") {
          // Claude.ai section: group by declaring agent
          var proj = agent + " Project";
          if (!claudeFiles[proj]) claudeFiles[proj] = {};
          if (!claudeFiles[proj][fileName]) claudeFiles[proj][fileName] = { agentFlags: {}, location: "Claude.ai" };
          claudeFiles[proj][fileName].agentFlags[agent] = flag;

        } else if (location === "github") {
          // GitHub section: TBD — placeholder, not yet rendered
          // Files will be collected here for future section support

        } else {
          // Drive section
          if (driveFolder) {
            // Authoritative path: Drive Folder from inventory
            if (!driveFiles[driveFolder]) driveFiles[driveFolder] = {};
            if (!driveFiles[driveFolder][fileName]) driveFiles[driveFolder][fileName] = { agentFlags: {}, location: "Drive" };
            driveFiles[driveFolder][fileName].agentFlags[agent] = flag;
          } else {
            // Blank Drive Folder + Location=Drive → Unknown
            // This is a data quality signal, not a routing instruction.
            // inferFolder() is NOT called here.
            if (!unknownFiles[fileName]) unknownFiles[fileName] = { agentFlags: {}, location: "Drive" };
            unknownFiles[fileName].agentFlags[agent] = flag;
          }
        }
      });

      return { drive: driveFiles, claudeai: claudeFiles, unknown: unknownFiles };
    }

    // ── Render the integrity bar chips
    function renderIntegrityBar(agents, agentStatusMap) {
      var bar  = document.getElementById("integrityBar");
      var html = '<span class="integrity-bar-label">Agent Canon Status —</span>';

      agents.forEach(function(agent) {
        var ci, label;
        if (agent.id === "AGT-000") {
          ci    = "var(--ci-na)";
          label = "N/A";
        } else {
          var row  = agentStatusMap[agent.nickname.toLowerCase()] || {};
          var ciVal = (row["Canon Integrity"] || "Unresponsive");
          ci    = ciColor(ciVal);
          label = ciVal;
        }
        html += '<div class="agent-chip">' +
          '<div class="ci-dot" style="background:' + ci + '"></div>' +
          '<span>' + escHtml(agent.nickname) + '</span>' +
          '<span style="color:' + ci + ';font-size:0.58rem;letter-spacing:0.06em">' + escHtml(label) + '</span>' +
          '</div>';
      });

      bar.innerHTML = html;
    }

    // ── Render one section (Drive or Claude.ai)
    // agents: ordered array from buildAgentList()
    // showUnknown: whether to append Unknown column
    function renderSection(title, folderMap, agents, agentStatusMap, unknownFiles) {
      var html = '<div class="section-header">' + escHtml(title) + '</div>';

      // Sort folders by agent order position, unknowns last A-Z
      var agentPos = {};
      agents.forEach(function(a, i) { agentPos[a.nickname.toLowerCase()] = i; });

      function folderSortKey(folder) {
        var base = folder.replace(/ Project$/, "").toLowerCase();
        var pos  = agentPos[base];
        return pos !== undefined ? pos : 9999;
      }

      var folders = Object.keys(folderMap).sort(function(a, b) {
        var diff = folderSortKey(a) - folderSortKey(b);
        return diff !== 0 ? diff : a.localeCompare(b);
      });

      // Determine if Unknown column is needed for this section
      var hasUnknown = unknownFiles && Object.keys(unknownFiles).length > 0;

      if (folders.length === 0 && !hasUnknown) {
        html += '<div style="background:var(--surface);border:1px solid var(--border);border-top:none;padding:1rem;font-size:0.68rem;color:var(--muted)">No files in this section.</div>';
        return html;
      }

      // Column widths: file = 2 units, each agent = 1 unit, unknown = 1 unit (if present)
      var unknownCols = hasUnknown ? 1 : 0;
      var totalUnits  = 2 + agents.length + unknownCols;
      var fileColPct  = (200 / totalUnits).toFixed(3) + "%";
      var agentColPct = (100 / totalUnits).toFixed(3) + "%";
      var totalCols   = 1 + agents.length + unknownCols; // file col + agent cols + unknown col

      html += '<table class="canon-table"><thead><tr>';
      html += '<th class="col-file" style="width:' + fileColPct + '">File</th>';

      agents.forEach(function(agent) {
        var isJeremy = agent.id === "AGT-000";
        var ciLabel, ciClr;
        if (isJeremy) {
          ciLabel = "N/A";
          ciClr   = "var(--ci-na)";
          html += '<th class="col-jeremy" style="width:' + agentColPct + '">' +
            escHtml(agent.nickname) +
            '<div class="th-status" style="color:' + ciClr + '">' + escHtml(ciLabel) + '</div>' +
            '</th>';
        } else {
          var row = agentStatusMap[agent.nickname.toLowerCase()] || {};
          ciLabel = row["Canon Integrity"] || "Unresponsive";
          ciClr   = ciColor(ciLabel);
          html += '<th style="width:' + agentColPct + '">' +
            escHtml(agent.nickname) +
            '<div class="th-status" style="color:' + ciClr + '">' + escHtml(ciLabel) + '</div>' +
            '</th>';
        }
      });

      if (hasUnknown) {
        html += '<th class="col-unknown" style="width:' + agentColPct + '">Unknown</th>';
      }

      html += '</tr></thead><tbody>';

      // Render folder rows
      folders.forEach(function(folder) {
        html += '<tr class="folder-row"><td colspan="' + totalCols + '">/' + escHtml(folder) + '</td></tr>';

        var files = Object.keys(folderMap[folder]).sort();
        files.forEach(function(fileName) {
          var entry = folderMap[folder][fileName];

          // Jeremy folder suppression: skip rows with no agent declarations
          // (Jeremy's folder files without On loan declarations are suppressed at buildMatrix time
          // since Meta1 already excluded them from FilesReported — this is a safety net)
          var isJeremyFolder = folder.toLowerCase() === "jeremy";
          if (isJeremyFolder) {
            var hasDeclaration = false;
            agents.forEach(function(a) {
              if (a.id !== "AGT-000" && entry.agentFlags[a.nickname]) hasDeclaration = true;
            });
            if (!hasDeclaration) return;
          }

          html += renderFileRow(fileName, entry, agents, hasUnknown, false);
        });
      });

      // Unknown column files (Drive files with blank Drive Folder)
      if (hasUnknown) {
        html += '<tr class="folder-row"><td colspan="' + totalCols + '">/Unknown</td></tr>';
        var unknownFileNames = Object.keys(unknownFiles).sort();
        unknownFileNames.forEach(function(fileName) {
          var entry = unknownFiles[fileName];
          html += renderFileRow(fileName, entry, agents, true, true);
        });
      }

      html += '</tbody></table>';
      return html;
    }

    // ── Render a single file row
    // isUnknownRow: true when the file itself has no Drive Folder (goes in Unknown section)
    function renderFileRow(fileName, entry, agents, hasUnknownCol, isUnknownRow) {
      var html = '<tr>';
      html += '<td class="col-file" title="' + escHtml(fileName) + '">' +
        escHtml(fileName) +
        '<span class="location-tag">[' + escHtml(entry.location) + ']</span></td>';

      agents.forEach(function(agent) {
        var isJeremy = agent.id === "AGT-000";
        var tdClass  = isJeremy ? "col-agent col-jeremy" : "col-agent";
        var flag     = entry.agentFlags[agent.nickname] || "";

        html += '<td class="' + tdClass + '">';
        if (flag) {
          var fi = flagInfo(flag);
          html += '<span class="flag-cell ' + fi.cls + '">' + fi.sym + ' ' + escHtml(flag) + '</span>';
        } else {
          html += '<span class="flag-cell flag-empty">·</span>';
        }
        html += '</td>';
      });

      // Unknown column cell — only rendered when hasUnknownCol is true
      if (hasUnknownCol) {
        html += '<td class="col-agent">';
        if (isUnknownRow) {
          // The file itself has no Drive Folder — mark Unknown
          html += '<span class="flag-cell flag-orphaned">! Unknown</span>';
        } else {
          html += '<span class="flag-cell flag-empty">·</span>';
        }
        html += '</td>';
      }

      html += '</tr>';
      return html;
    }

    function escHtml(str) {
      return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Update embedded JSON block for Claude/QA readability
    function updateEmbeddedData(agents, agentStatusMap, jeremyRow, fileRows, generated) {
      var agentArr = agents.map(function(agent) {
        if (agent.id === "AGT-000") {
          return {
            nickname:       agent.nickname,
            agentId:        agent.id,
            order:          1,
            status:         jeremyRow ? (jeremyRow["Agent Status"] || "") : "",
            canonIntegrity: "N/A",
            lastSignal:     jeremyRow ? (jeremyRow["Last Signal"] || jeremyRow["Timestamp"] || "") : ""
          };
        }
        var row = agentStatusMap[agent.nickname.toLowerCase()] || {};
        return {
          nickname:       agent.nickname,
          agentId:        agent.id,
          order:          agent.order,
          status:         row["Agent Status"] || "",
          canonIntegrity: row["Canon Integrity"] || "Unresponsive",
          lastSignal:     row["Last Signal"] || ""
        };
      });

      var payload = { generated: generated, agents: agentArr, files: fileRows };
      document.getElementById("canon-data").textContent = JSON.stringify(payload, null, 2);
    }

    // ── Main load — three parallel fetches
    async function loadData() {
      document.getElementById("lastRefresh").textContent = "Refreshing...";
      try {
        var bust = "&cachebust=" + Date.now();
        var [statusRes, filesRes, checkinRes] = await Promise.all([
          fetch(sheetUrl(TAB_STATUS)  + bust),
          fetch(sheetUrl(TAB_FILES)   + bust),
          fetch(sheetUrl(TAB_CHECKIN) + bust)
        ]);

        var statusRows  = parseCSV(await statusRes.text());
        var fileRows    = parseCSV(await filesRes.text());
        var checkinRows = parseCSV(await checkinRes.text());

        var agentStatusMap = latestAgentStatus(statusRows);
        var jeremyRow      = latestHumanCheckin(checkinRows);

        // Build ordered agent list from sheet data — no hardcoded roster
        var agents = buildAgentList(statusRows);

        // Agent nicknames for inferFolder (flag logic only — never placement)
        var agentNicknames = agents
          .filter(function(a) { return a.id !== "AGT-000"; })
          .map(function(a) { return a.nickname; });

        var matrix = buildMatrix(fileRows, agentNicknames);

        renderIntegrityBar(agents, agentStatusMap);

        var output = "";
        output += renderSection("Drive",     matrix.drive,    agents, agentStatusMap, matrix.unknown);
        output += renderSection("Claude.ai", matrix.claudeai, agents, agentStatusMap, null);
        document.getElementById("canonOutput").innerHTML = output;

        var totalFiles = fileRows.length;
        document.getElementById("fileCount").textContent =
          totalFiles + " file declaration" + (totalFiles !== 1 ? "s" : "") + " in set";

        document.getElementById("lastRefresh").textContent =
          "Last refresh: " + new Date().toLocaleTimeString();

        updateEmbeddedData(agents, agentStatusMap, jeremyRow, fileRows, new Date().toISOString());

      } catch (err) {
        document.getElementById("canonOutput").innerHTML =
          '<div class="state-msg">' +
          '<div class="big">Error</div>' +
          '<div>Could not load canon data. Check SHEET_ID and sheet visibility.</div>' +
          '</div>';
        document.getElementById("lastRefresh").textContent = "Error loading data";
        console.error(err);
      }
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
