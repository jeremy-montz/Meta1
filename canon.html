<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canon — Claudemonzter</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --surface2:   #16161f;
      --border:     #1e1e2e;
      --accent:     #00ff9d;
      --accent2:    #7b61ff;
      --warn:       #ff8c00;
      --error:      #ff4f4f;
      --info:       #4fc3f7;
      --text:       #e0e0f0;
      --muted:      #5a5a7a;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Syne', sans-serif;

      /* Canon integrity colors — three values only: Clean / Alert / Error */
      --ci-clean:   #00ff9d;
      --ci-alert:   #ffb700;
      --ci-error:   #ff4f4f;
      --ci-na:      #5a5a7a;

      /* File flag colors */
      --flag-clean:    #00ff9d;
      --flag-onloan:   #7b61ff;
      --flag-orphaned: #ff8c00;
      --flag-phantom:  #ff4f4f;
      --flag-stale:    #ffb700;
      --flag-alert:    #ffb700;
      --flag-error:    #ff4f4f;
      --flag-native:   #c084fc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-tag {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    h1 {
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .header-meta { text-align: right; }

    .last-refresh {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .refresh-btn {
      margin-top: 0.4rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: border-color 0.2s, color 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Integrity bar ── */
    .integrity-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
    }

    .integrity-bar-label {
      color: var(--muted);
      text-transform: uppercase;
      margin-right: 0.25rem;
    }

    .agent-chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.55rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .ci-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Section header ── */
    .section-header {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: none;
      margin-top: 1.5rem;
    }

    /* ── Table ── */
    .canon-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-top: none;
      table-layout: fixed;
    }

    .canon-table thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    .canon-table th {
      padding: 0.5rem 0.75rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      border-right: 1px solid var(--border);
      overflow: hidden;
      vertical-align: top;
    }

    .canon-table th.col-file { text-align: left; }
    .canon-table th.col-unknown { color: var(--warn); }

    /* Jeremy column header — slightly distinct */
    .canon-table th.col-jeremy {
      color: var(--info);
      border-left: 2px solid var(--info);
    }

    .th-status {
      font-size: 0.52rem;
      font-weight: 400;
      margin-top: 0.25rem;
      letter-spacing: 0.04em;
      text-transform: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canon-table td {
      padding: 0.4rem 0.75rem;
      font-size: 0.68rem;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .canon-table tr:hover td { background: rgba(255,255,255,0.02); }

    .canon-table td.col-file { color: var(--text); }

    .canon-table td.col-file .location-tag {
      font-size: 0.55rem;
      color: var(--muted);
      margin-left: 0.4rem;
      letter-spacing: 0.08em;
    }

    .canon-table td.col-agent { text-align: center; }

    /* Jeremy column cells */
    .canon-table td.col-jeremy {
      text-align: center;
      border-left: 2px solid rgba(79,195,247,0.2);
    }

    /* Folder separator row */
    .canon-table tr.folder-row td {
      background: var(--surface);
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 0.75rem;
      border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    /* ── Flag cells ── */
    .flag-cell {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      white-space: nowrap;
    }

    .flag-clean    { color: var(--flag-clean);    background: rgba(0,255,157,0.08); }
    .flag-onloan   { color: var(--flag-onloan);   background: rgba(123,97,255,0.1); }
    .flag-orphaned { color: var(--flag-orphaned); background: rgba(255,140,0,0.1); }
    .flag-phantom  { color: var(--flag-phantom);  background: rgba(255,79,79,0.1); }
    .flag-stale    { color: var(--flag-stale);    background: rgba(255,183,0,0.1); }
    .flag-alert    { color: var(--flag-alert);    background: rgba(255,183,0,0.1); }
    .flag-error    { color: var(--flag-error);    background: rgba(255,79,79,0.1); }
    .flag-native   { color: var(--flag-native);   background: rgba(192,132,252,0.1); }
    .flag-unknown  { color: var(--warn);          background: rgba(255,140,0,0.1); }
    .flag-empty    { color: var(--border);        font-size: 0.5rem; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding: 0.6rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .legend-item { display: flex; align-items: center; gap: 0.3rem; }
    .legend-flag { font-size: 0.7rem; }

    /* ── State messages ── */
    .state-msg {
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .state-msg .big {
      font-family: var(--sans);
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="header-left">
        <div class="header-tag">// canon integrity</div>
        <h1>Canon <span>Matrix</span></h1>
      </div>
      <div class="header-meta">
        <div class="last-refresh" id="lastRefresh">—</div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>

    <div class="integrity-bar" id="integrityBar">
      <span class="integrity-bar-label">Agent Canon Status —</span>
    </div>

    <div id="canonOutput">
      <div class="state-msg">
        <div class="big">Loading...</div>
        <div>Fetching canon data</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-clean)">●</span> Clean</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-onloan)">⟳</span> On loan</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-orphaned)">!</span> Orphaned</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-phantom)">✕</span> Phantom</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-stale)">⚠</span> Stale</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-alert)">▲</span> Alert</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-error)">✖</span> Error</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--flag-native)">⬡</span> Claude.ai-native</div>
      <div class="legend-item"><span class="legend-flag" style="color:var(--border)">·</span> Not loaded</div>
    </div>

    <div class="footer">
      <span>canon v0.5</span>
      <span id="fileCount">—</span>
    </div>

  </div>

  <!-- Embedded JSON block for Claude/QA readability -->
  <script type="application/json" id="canon-data">
  {
    "generated": null,
    "agents": [],
    "files": []
  }
  </script>

  <script>
    var SHEET_ID        = "12JrRfdHx2u2wsU_KQPHkYDRNk3_jUIEV9zSq4lFe8KE";
    var TAB_STATUS      = "AgentStatus";
    var TAB_FILES       = "FilesReported";
    var TAB_CHECKIN     = "HumanCheckin";

    // ── Canonical roster — AGT-000 first, then AGT-001 through AGT-007 in order.
    // Jeremy (AGT-000) is hardcoded — never appears in AgentStatus CSV.
    // All others derive live data from AgentStatus. Order here = column order.
    var CANONICAL_ROSTER = [
      { nickname: "Jeremy",   id: "AGT-000", order: 1 },
      { nickname: "Meta1",    id: "AGT-001", order: 2 },
      { nickname: "House",    id: "AGT-002", order: 3 },
      { nickname: "Freedom",  id: "AGT-003", order: 4 },
      { nickname: "Evolve",   id: "AGT-004", order: 5 },
      { nickname: "Assessor", id: "AGT-005", order: 6 },
      { nickname: "Phil",     id: "AGT-006", order: 7 },
      { nickname: "Bond",     id: "AGT-007", order: 8 }
    ];

    function sheetUrl(tab) {
      return "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
             "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(tab);
    }

    // ── CSV parser — handles quoted fields with commas
    function parseCSV(text) {
      var lines = text.trim().split("\n");
      if (lines.length < 2) return [];
      var headers = lines[0].split(",").map(function(h) {
        return h.replace(/^"|"$/g, "").trim();
      });
      return lines.slice(1).map(function(line) {
        var cols = [], inQuote = false, current = "";
        for (var i = 0; i < line.length; i++) {
          var ch = line[i];
          if (ch === '"') { inQuote = !inQuote; }
          else if (ch === ',' && !inQuote) { cols.push(current); current = ""; }
          else { current += ch; }
        }
        cols.push(current);
        var obj = {};
        headers.forEach(function(h, i) {
          obj[h] = (cols[i] || "").replace(/^"|"$/g, "").trim();
        });
        return obj;
      });
    }

    // ── Latest row per agent nickname from AgentStatus
    function latestAgentStatus(rows) {
      var map = {};
      rows.forEach(function(r) {
        var k = (r["Agent Nickname"] || "").toLowerCase();
        if (k) map[k] = r;
      });
      return map;
    }

    // ── Latest single row from HumanCheckin (Jeremy's write surface)
    // Rows are appended chronologically; last row wins.
    function latestHumanCheckin(rows) {
      if (!rows.length) return null;
      return rows[rows.length - 1];
    }

    // ── CI color — three values only: Clean / Alert / Error / N/A
    function ciColor(ci) {
      var m = {
        "clean": "var(--ci-clean)",
        "alert": "var(--ci-alert)",
        "error": "var(--ci-error)"
      };
      return m[(ci || "").toLowerCase()] || "var(--ci-na)";
    }

    // ── Flag info — symbol + CSS class
    // Bug fixes: removed crossload/not-loaded (legacy artifacts); added alert/error
    function flagInfo(flag) {
      if (!flag) return { sym: "·", cls: "flag-empty" };
      var map = {
        "clean":        { sym: "●", cls: "flag-clean" },
        "on loan":      { sym: "⟳", cls: "flag-onloan" },
        "onloan":       { sym: "⟳", cls: "flag-onloan" },
        "orphaned":     { sym: "!", cls: "flag-orphaned" },
        "phantom":      { sym: "✕", cls: "flag-phantom" },
        "stale":        { sym: "⚠", cls: "flag-stale" },
        "alert":        { sym: "▲", cls: "flag-alert" },
        "error":        { sym: "✖", cls: "flag-error" },
        "claude.ai-native": { sym: "⬡", cls: "flag-native" },
        "native":       { sym: "⬡", cls: "flag-native" }
      };
      var flagLower = flag.toLowerCase().trim();
      return map[flagLower] || { sym: flag.charAt(0).toUpperCase(), cls: "flag-unknown" };
    }

    // ── Build matrix from FilesReported rows.
    // Bug fix #1: Drive folder from the row's Drive Folder column (or inferred from filename)
    //             is the authority for section/folder placement — NOT inferFolder().
    //             inferFolder() is only called to inform flag logic.
    // Bug fix #3: Claude.ai location match is case-insensitive and trim-tolerant.
    function buildMatrix(fileRows, agentNicknames) {
      var driveFiles  = {};
      var claudeFiles = {};

      fileRows.forEach(function(row) {
        var agent    = (row["Agent Nickname"] || "Unknown").trim();
        var fileName = (row["File Name"] || "").trim();
        // Drive Folder column is authoritative for folder placement.
        // Fall back to inferFolder() only if the column is absent/blank.
        var driveFolder = (row["Drive Folder"] || "").trim();
        var location = (row["Location"] || "Drive").trim();
        var flag     = (row["Flag"] || "").trim();

        if (!fileName) return;

        // Bug fix #3: case-insensitive Claude.ai match
        if (location.toLowerCase() === "claude.ai") {
          var proj = agent + " Project";
          if (!claudeFiles[proj]) claudeFiles[proj] = {};
          if (!claudeFiles[proj][fileName]) claudeFiles[proj][fileName] = { agentFlags: {}, location: "Claude.ai" };
          claudeFiles[proj][fileName].agentFlags[agent] = flag;
        } else {
          // Drive placement: use Drive Folder column if present, else infer from filename
          var folder = driveFolder || inferFolder(fileName, agentNicknames) || "Other";
          if (!driveFiles[folder]) driveFiles[folder] = {};
          if (!driveFiles[folder][fileName]) driveFiles[folder][fileName] = { agentFlags: {}, location: "Drive" };
          driveFiles[folder][fileName].agentFlags[agent] = flag;
        }
      });

      return { drive: driveFiles, claudeai: claudeFiles };
    }

    // ── inferFolder — only for flag logic fallback, NOT for section routing
    function inferFolder(fileName, agentNicknames) {
      var lower = fileName.toLowerCase();
      for (var i = 0; i < agentNicknames.length; i++) {
        if (lower.startsWith(agentNicknames[i].toLowerCase())) {
          return agentNicknames[i];
        }
      }
      return null;
    }

    // ── Render the integrity bar chips
    // Jeremy gets N/A — hardcoded. No CI chip in bar for Jeremy (matches dashboard behavior).
    // Bug fix #2: ciColor() now only maps Clean/Alert/Error — no file-flag vocabulary.
    function renderIntegrityBar(agentStatusMap, jeremyRow) {
      var bar  = document.getElementById("integrityBar");
      var html = '<span class="integrity-bar-label">Agent Canon Status —</span>';

      CANONICAL_ROSTER.forEach(function(agent) {
        var isJeremy = agent.id === "AGT-000";
        var ci, label;

        if (isJeremy) {
          ci    = "var(--ci-na)";
          label = "N/A";
        } else {
          var row = agentStatusMap[agent.nickname.toLowerCase()] || {};
          var ciVal = (row["Canon Integrity"] || "Unresponsive");
          ci    = ciColor(ciVal);
          label = ciVal;
        }

        html += '<div class="agent-chip">' +
          '<div class="ci-dot" style="background:' + ci + '"></div>' +
          '<span>' + escHtml(agent.nickname) + '</span>' +
          '<span style="color:' + ci + ';font-size:0.58rem;letter-spacing:0.06em">' + escHtml(label) + '</span>' +
          '</div>';
      });

      bar.innerHTML = html;
    }

    // ── Render one section (Drive or Claude.ai)
    // Bug fix #4: columns derived from CANONICAL_ROSTER, not FilesReported nicknames.
    //             Jeremy always gets the first column.
    // Jeremy's column: shows On loan entries only (no folder suppression render).
    // Jeremy's column header: CI = N/A (hardcoded).
    function renderSection(title, folderMap, agentStatusMap, jeremyRow) {
      var html = '<div class="section-header">' + escHtml(title) + '</div>';

      // Sort folders: match by canonical roster position, unknowns last
      var agentPos = {};
      CANONICAL_ROSTER.forEach(function(a, i) {
        agentPos[a.nickname.toLowerCase()] = i;
      });

      function folderSortKey(folder) {
        var base = folder.replace(/ Project$/, "").toLowerCase();
        var pos  = agentPos[base];
        return pos !== undefined ? pos : 9999;
      }

      var folders = Object.keys(folderMap).sort(function(a, b) {
        var diff = folderSortKey(a) - folderSortKey(b);
        return diff !== 0 ? diff : a.localeCompare(b);
      });

      if (folders.length === 0) {
        html += '<div style="background:var(--surface);border:1px solid var(--border);border-top:none;padding:1rem;font-size:0.68rem;color:var(--muted)">No files in this section.</div>';
        return html;
      }

      // Column widths: file = 2 units, each agent/unknown = 1 unit
      // Columns: Jeremy + (roster agents minus Jeremy) + Unknown
      var agentCols   = CANONICAL_ROSTER.length; // includes Jeremy
      var totalUnits  = agentCols + 3;            // 2 (file) + N (roster) + 1 (unknown)
      var fileColPct  = (200 / totalUnits).toFixed(3) + "%";
      var agentColPct = (100 / totalUnits).toFixed(3) + "%";
      var totalCols   = agentCols + 2;            // file + roster + unknown

      html += '<table class="canon-table"><thead><tr>';
      html += '<th class="col-file" style="width:' + fileColPct + '">File</th>';

      CANONICAL_ROSTER.forEach(function(agent) {
        var isJeremy = agent.id === "AGT-000";
        var ciLabel, ciClr;

        if (isJeremy) {
          ciLabel = "N/A";
          ciClr   = "var(--ci-na)";
          html += '<th class="col-jeremy" style="width:' + agentColPct + '">' +
            escHtml(agent.nickname) +
            '<div class="th-status" style="color:' + ciClr + '">' + escHtml(ciLabel) + '</div>' +
            '</th>';
        } else {
          var row   = agentStatusMap[agent.nickname.toLowerCase()] || {};
          ciLabel   = row["Canon Integrity"] || "Unresponsive";
          ciClr     = ciColor(ciLabel);
          html += '<th style="width:' + agentColPct + '">' +
            escHtml(agent.nickname) +
            '<div class="th-status" style="color:' + ciClr + '">' + escHtml(ciLabel) + '</div>' +
            '</th>';
        }
      });

      html += '<th class="col-unknown" style="width:' + agentColPct + '">Unknown</th>';
      html += '</tr></thead><tbody>';

      folders.forEach(function(folder) {
        html += '<tr class="folder-row"><td colspan="' + totalCols + '">/' + escHtml(folder) + '</td></tr>';

        var files = Object.keys(folderMap[folder]).sort();
        files.forEach(function(fileName) {
          var entry = folderMap[folder][fileName];

          // Determine if this file is in Jeremy's folder.
          // If so, suppress the row unless an agent declared it (On loan).
          var isJeremyFolder = folder.toLowerCase() === "jeremy";
          var hasAgentDeclaration = false;
          CANONICAL_ROSTER.forEach(function(agent) {
            if (agent.id !== "AGT-000" && entry.agentFlags[agent.nickname]) {
              hasAgentDeclaration = true;
            }
          });
          if (isJeremyFolder && !hasAgentDeclaration) return; // suppress

          html += '<tr>';
          html += '<td class="col-file" title="' + escHtml(fileName) + '">' +
            escHtml(fileName) +
            '<span class="location-tag">[' + escHtml(entry.location) + ']</span></td>';

          var anyDeclared = false;

          CANONICAL_ROSTER.forEach(function(agent) {
            var isJeremy = agent.id === "AGT-000";
            var tdClass  = isJeremy ? "col-agent col-jeremy" : "col-agent";
            var flag     = entry.agentFlags[agent.nickname] || "";

            html += '<td class="' + tdClass + '">';
            if (flag) {
              anyDeclared = true;
              var fi = flagInfo(flag);
              html += '<span class="flag-cell ' + fi.cls + '">' + fi.sym + ' ' + escHtml(flag) + '</span>';
            } else {
              html += '<span class="flag-cell flag-empty">·</span>';
            }
            html += '</td>';
          });

          // Unknown column: fires if no roster agent declared this file
          html += '<td class="col-agent">';
          if (!anyDeclared) {
            html += '<span class="flag-cell flag-orphaned">! Orphaned</span>';
          } else {
            html += '<span class="flag-cell flag-empty">·</span>';
          }
          html += '</td>';

          html += '</tr>';
        });
      });

      html += '</tbody></table>';
      return html;
    }

    function escHtml(str) {
      return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Update embedded JSON block for Claude/QA readability
    function updateEmbeddedData(agentStatusMap, jeremyRow, fileRows, generated) {
      var agentArr = CANONICAL_ROSTER.map(function(agent) {
        if (agent.id === "AGT-000") {
          return {
            nickname:       agent.nickname,
            agentId:        agent.id,
            status:         jeremyRow ? (jeremyRow["Agent Status"] || "") : "",
            canonIntegrity: "N/A",
            lastSignal:     jeremyRow ? (jeremyRow["Last Signal"] || jeremyRow["Timestamp"] || "") : ""
          };
        }
        var row = agentStatusMap[agent.nickname.toLowerCase()] || {};
        return {
          nickname:       agent.nickname,
          agentId:        agent.id,
          status:         row["Agent Status"] || "",
          canonIntegrity: row["Canon Integrity"] || "Unresponsive",
          lastSignal:     row["Last Signal"] || ""
        };
      });

      var payload = { generated: generated, agents: agentArr, files: fileRows };
      document.getElementById("canon-data").textContent = JSON.stringify(payload, null, 2);
    }

    // ── Main load — three parallel fetches
    // Bug fix #8: HumanCheckin added as third fetch for Jeremy's data
    async function loadData() {
      document.getElementById("lastRefresh").textContent = "Refreshing...";
      try {
        var bust = "&cachebust=" + Date.now();
        var [statusRes, filesRes, checkinRes] = await Promise.all([
          fetch(sheetUrl(TAB_STATUS)  + bust),
          fetch(sheetUrl(TAB_FILES)   + bust),
          fetch(sheetUrl(TAB_CHECKIN) + bust)
        ]);

        var statusRows  = parseCSV(await statusRes.text());
        var fileRows    = parseCSV(await filesRes.text());
        var checkinRows = parseCSV(await checkinRes.text());

        var agentStatusMap = latestAgentStatus(statusRows);
        var jeremyRow      = latestHumanCheckin(checkinRows);

        // Agent nicknames for fallback folder inference (excludes Jeremy)
        var agentNicknames = CANONICAL_ROSTER
          .filter(function(a) { return a.id !== "AGT-000"; })
          .map(function(a) { return a.nickname; });

        var matrix = buildMatrix(fileRows, agentNicknames);

        renderIntegrityBar(agentStatusMap, jeremyRow);

        var output = "";
        output += renderSection("Drive",     matrix.drive,    agentStatusMap, jeremyRow);
        output += renderSection("Claude.ai", matrix.claudeai, agentStatusMap, jeremyRow);
        document.getElementById("canonOutput").innerHTML = output;

        var totalFiles = fileRows.length;
        document.getElementById("fileCount").textContent =
          totalFiles + " file declaration" + (totalFiles !== 1 ? "s" : "") + " in set";

        document.getElementById("lastRefresh").textContent =
          "Last refresh: " + new Date().toLocaleTimeString();

        updateEmbeddedData(agentStatusMap, jeremyRow, fileRows, new Date().toISOString());

      } catch (err) {
        document.getElementById("canonOutput").innerHTML =
          '<div class="state-msg">' +
          '<div class="big">Error</div>' +
          '<div>Could not load canon data. Check SHEET_ID and sheet visibility.</div>' +
          '</div>';
        document.getElementById("lastRefresh").textContent = "Error loading data";
        console.error(err);
      }
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
